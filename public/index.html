<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CI/CD Quiz</title>
  <style>
   /* =========================
PROFESSIONAL MODERN UI
========================= */

*,
*::before,
*::after{
box-sizing:border-box;
margin:0;
padding:0;
}

:root{
--bg:#020617;
--surface:rgba(15,23,42,.75);
--card:rgba(30,41,59,.8);
--border:rgba(255,255,255,.08);

--accent:#6366f1;
--accent-hover:#4f46e5;
--accent-light:rgba(99,102,241,.15);

--green:#22c55e;
--red:#ef4444;
--yellow:#f59e0b;

--text:#f8fafc;
--muted:#94a3b8;

--radius:18px;

--shadow-sm:0 4px 12px rgba(0,0,0,.15);
--shadow-md:0 10px 30px rgba(0,0,0,.25);
--shadow-lg:0 20px 50px rgba(0,0,0,.35);
}

body{
background:
radial-gradient(circle at top left,#4338ca 0%,transparent 35%),
radial-gradient(circle at top right,#0f766e 0%,transparent 35%),
linear-gradient(135deg,#020617,#0f172a);

color:var(--text);

font-family:
Inter,
"Segoe UI",
system-ui,
sans-serif;

min-height:100vh;

display:flex;
justify-content:center;

padding:40px 20px;
}

.container{
width:100%;
max-width:900px;
}

/* HEADER */

.header{
text-align:center;
margin-bottom:2.5rem;
}

.badge{
display:inline-block;

padding:8px 18px;

border-radius:999px;

background:rgba(99,102,241,.15);

border:1px solid rgba(99,102,241,.3);

color:#c7d2fe;

font-size:.8rem;
font-weight:700;

margin-bottom:1rem;
}

.header h1{
font-size:3rem;
font-weight:800;
letter-spacing:-1px;
}

.header p{
color:var(--muted);
margin-top:.6rem;
}

/* CARD */

.card{
background:var(--card);

backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);

border:1px solid var(--border);

border-radius:var(--radius);

padding:28px;

box-shadow:var(--shadow-lg);

margin-bottom:1.2rem;

transition:.3s ease;
}

.card:hover{
transform:translateY(-3px);
}

/* BUTTONS */

.btn{
display:inline-flex;
align-items:center;
justify-content:center;

gap:8px;

border:none;
cursor:pointer;

font-weight:600;

border-radius:12px;

transition:.25s ease;
}

.btn-primary{
width:100%;

background:
linear-gradient(
135deg,
#6366f1,
#4f46e5
);

color:white;

padding:14px 22px;

box-shadow:
0 12px 24px rgba(99,102,241,.35);
}

.btn-primary:hover{
transform:translateY(-2px);

box-shadow:
0 16px 34px rgba(99,102,241,.45);
}

.btn-outline{
background:rgba(255,255,255,.03);

border:1px solid var(--border);

color:var(--text);

padding:12px 18px;
}

.btn-outline:hover{
border-color:var(--accent);

background:var(--accent-light);
}

/* START SCREEN */

.start-screen h2{
font-size:1.4rem;
margin-bottom:.6rem;
}

.start-screen p{
color:var(--muted);
line-height:1.7;
}

.count-selector{
display:flex;
gap:10px;
margin-top:1rem;
flex-wrap:wrap;
}

.count-btn{
padding:10px 18px;

border-radius:12px;

border:1px solid var(--border);

background:transparent;

color:var(--muted);

cursor:pointer;

transition:.25s;
}

.count-btn.active,
.count-btn:hover{
background:rgba(99,102,241,.15);

border-color:var(--accent);

color:white;
}

/* PROGRESS */

.progress-bar{
height:8px;

background:rgba(255,255,255,.08);

border-radius:999px;

overflow:hidden;

margin-bottom:20px;
}

.progress-fill{
height:100%;

background:
linear-gradient(
90deg,
#6366f1,
#8b5cf6
);

border-radius:999px;

transition:width .4s ease;
}

/* META */

.quiz-meta{
display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:16px;

color:var(--muted);
}

.category-tag{
padding:6px 14px;

border-radius:999px;

background:rgba(99,102,241,.12);

border:1px solid rgba(99,102,241,.25);

color:#c7d2fe;
}

/* QUESTION */

.question-text{
font-size:1.3rem;
font-weight:700;
line-height:1.7;
margin-bottom:20px;
}

/* OPTIONS */

.options{
display:flex;
flex-direction:column;
gap:12px;
}

.option{
display:flex;
align-items:center;
gap:14px;

padding:18px;

border-radius:14px;

border:1px solid var(--border);

background:rgba(255,255,255,.03);

cursor:pointer;

transition:.25s ease;
}

.option:hover{
transform:translateX(5px);

border-color:rgba(99,102,241,.5);

background:rgba(99,102,241,.08);
}

.option.selected{
border-color:var(--accent);

background:rgba(99,102,241,.15);
}

.option-letter{
width:40px;
height:40px;

border-radius:50%;

background:rgba(255,255,255,.08);

display:flex;
align-items:center;
justify-content:center;

font-weight:700;
}

.option.selected .option-letter{
background:var(--accent);
color:white;
}

.option.correct{
border-color:var(--green);
}

.option.correct .option-letter{
background:var(--green);
color:white;
}

.option.wrong{
border-color:var(--red);
}

.option.wrong .option-letter{
background:var(--red);
color:white;
}

/* NAV */

.nav-btns{
display:flex;
justify-content:space-between;
align-items:center;

gap:12px;

margin-top:20px;
}

/* SCORE */

.score-circle{
width:140px;
height:140px;

border-radius:50%;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

background:rgba(255,255,255,.03);

backdrop-filter:blur(12px);

box-shadow:
0 0 35px rgba(99,102,241,.2);

margin:0 auto 20px;
}

.score-num{
font-size:2.4rem;
font-weight:800;
}

.score-label{
color:var(--muted);
}

.grade-badge{
font-size:3rem;
font-weight:800;
margin-bottom:8px;
}

/* STATS */

.stats-grid{
display:grid;

grid-template-columns:
repeat(3,1fr);

gap:15px;

margin-top:20px;
}

.stat{
background:rgba(255,255,255,.04);

border:1px solid var(--border);

border-radius:14px;

padding:18px;

text-align:center;
}

.stat-val{
font-size:1.4rem;
font-weight:800;
}

.stat-lbl{
color:var(--muted);
font-size:.8rem;
}

/* REVIEW */

.review-q{
font-size:1rem;
font-weight:700;
margin-bottom:10px;
}

.review-answer{
padding:10px 14px;

border-radius:10px;

margin-top:6px;
}

.correct-ans{
background:rgba(34,197,94,.12);
border:1px solid rgba(34,197,94,.25);
color:var(--green);
}

.wrong-ans{
background:rgba(239,68,68,.12);
border:1px solid rgba(239,68,68,.25);
color:var(--red);
}

.explanation{
margin-top:10px;

background:rgba(255,255,255,.03);

padding:12px;

border-radius:10px;

color:var(--muted);

line-height:1.7;
}

/* LOADING */

.loading{
text-align:center;
padding:4rem;
}

.spinner{
width:40px;
height:40px;

border:4px solid rgba(255,255,255,.1);

border-top:4px solid var(--accent);

border-radius:50%;

margin:0 auto 20px;

animation:spin .8s linear infinite;
}

@keyframes spin{
to{
transform:rotate(360deg);
}
}

/* TOAST */

.toast{
position:fixed;

bottom:25px;
left:50%;

transform:translateX(-50%);

background:rgba(15,23,42,.95);

border:1px solid var(--border);

backdrop-filter:blur(16px);

padding:12px 20px;

border-radius:999px;

box-shadow:var(--shadow-md);

opacity:0;

transition:.25s;
}

.toast.show{
opacity:1;
}

/* PASS FAIL */

.passed{
color:var(--green);
}

.failed{
color:var(--red);
}

/* ANIMATION */

.card,
.option,
.btn{
animation:fadeIn .35s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(15px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* MOBILE */

@media(max-width:768px){

.header h1{
font-size:2.2rem;
}

.stats-grid{
grid-template-columns:1fr;
}

.quiz-meta{
flex-wrap:wrap;
gap:10px;
}

.nav-btns{
flex-direction:column;
}

.btn{
width:100%;
}
}
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="badge">Node.js + CI/CD</div>
    <h1>🚀 CI/CD Quiz</h1>
    <p>Test your knowledge of pipelines, Docker, and DevOps</p>
  </div>

  <div id="app"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const API = '/api/quiz';
let state = {
  screen: 'start',   // start | quiz | results
  sessionId: null,
  questions: [],
  current: 0,
  answers: {},
  results: null,
  count: 10,
  timerInterval: null,
  elapsed: 0
};

const LETTERS = ['A', 'B', 'C', 'D'];

function render() {
  const app = document.getElementById('app');
  if (state.screen === 'start') app.innerHTML = renderStart();
  else if (state.screen === 'quiz') app.innerHTML = renderQuiz();
  else if (state.screen === 'results') app.innerHTML = renderResults();
  bindEvents();
}

function renderStart() {
  const counts = [5, 10, 15];
  return `
  <div class="card start-screen">
    <h2>How many questions?</h2>
    <p>Each question covers a CI/CD topic: pipelines, GitHub Actions, Docker, deployment strategies, Git, and security.</p>
    <div class="count-selector">
      ${counts.map(n => `<button class="count-btn ${state.count === n ? 'active' : ''}" data-count="${n}">${n} questions</button>`).join('')}
    </div>
    <button class="btn btn-primary" id="start-btn">Start Quiz →</button>
  </div>`;
}

function renderQuiz() {
  const q = state.questions[state.current];
  const total = state.questions.length;
  const pct = ((state.current) / total) * 100;
  const answered = Object.keys(state.answers).length;
  const mins = String(Math.floor(state.elapsed / 60)).padStart(2, '0');
  const secs = String(state.elapsed % 60).padStart(2, '0');
  const timerClass = state.elapsed > 600 ? 'timer urgent' : 'timer';

  return `
  <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  <div class="quiz-meta">
    <span class="${timerClass}">⏱ ${mins}:${secs}</span>
    <span class="category-tag">${q.category}</span>
    <span>${state.current + 1} / ${total}</span>
  </div>
  <div class="card">
    <div class="question-text">${q.question}</div>
    <div class="options">
      ${q.options.map((opt, i) => `
        <div class="option ${state.answers[q.id] === i ? 'selected' : ''}" data-opt="${i}">
          <div class="option-letter">${LETTERS[i]}</div>
          <span>${opt}</span>
        </div>
      `).join('')}
    </div>
  </div>
  <div class="nav-btns">
    <button class="btn btn-outline" id="prev-btn" ${state.current === 0 ? 'disabled' : ''}>← Back</button>
    <span style="font-size:0.82rem;color:var(--muted)">${answered}/${total} answered</span>
    ${state.current < total - 1
      ? `<button class="btn btn-outline" id="next-btn">Next →</button>`
      : `<button class="btn btn-primary" id="submit-btn" style="width:auto">Submit Quiz ✓</button>`
    }
  </div>`;
}

function renderResults() {
  const r = state.results;
  const gradeColor = r.passed ? 'var(--green)' : 'var(--red)';
  const mins = String(Math.floor(r.timeTaken / 60)).padStart(2,'0');
  const secs = String(r.timeTaken % 60).padStart(2,'0');

  return `
  <div class="card" style="text-align:center">
    <div class="grade-badge" style="color:${gradeColor}">Grade ${r.grade}</div>
    <div class="score-circle" style="border-color:${gradeColor}">
      <div class="score-num">${r.percentage}%</div>
      <div class="score-label">Score</div>
    </div>
    <p style="font-size:1.1rem;font-weight:600" class="${r.passed ? 'passed' : 'failed'}">
      ${r.passed ? '🎉 Passed!' : '❌ Not passed'}
    </p>
    <div class="stats-grid">
      <div class="stat"><div class="stat-val" style="color:var(--green)">${r.score}</div><div class="stat-lbl">Correct</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--red)">${r.total - r.score}</div><div class="stat-lbl">Wrong</div></div>
      <div class="stat"><div class="stat-val">${mins}:${secs}</div><div class="stat-lbl">Time</div></div>
    </div>
    <button class="btn btn-primary" id="restart-btn">Try Again →</button>
  </div>

  <div style="margin-top:1.5rem">
    <h3 style="margin-bottom:1rem;font-size:1rem;color:var(--muted)">Review Answers</h3>
    ${r.results.map((item, idx) => `
      <div class="card review-item">
        <div class="quiz-meta" style="margin-bottom:0.5rem">
          <span class="category-tag">${item.category}</span>
          <span>${item.correct ? '✅' : '❌'}</span>
        </div>
        <div class="review-q">${idx + 1}. ${item.question}</div>
        ${item.userAnswer !== null
          ? `<div class="review-answer ${item.correct ? 'correct-ans' : 'wrong-ans'}">
              Your answer: ${LETTERS[item.userAnswer]}. ${item.options[item.userAnswer]}
             </div>`
          : `<div class="review-answer wrong-ans">Not answered</div>`
        }
        ${!item.correct
          ? `<div class="review-answer correct-ans">Correct: ${LETTERS[item.correctAnswer]}. ${item.options[item.correctAnswer]}</div>`
          : ''
        }
        <div class="explanation">💡 ${item.explanation}</div>
      </div>
    `).join('')}
  </div>`;
}

function bindEvents() {
  document.querySelectorAll('.count-btn').forEach(btn => {
    btn.onclick = () => { state.count = parseInt(btn.dataset.count); render(); };
  });

  const startBtn = document.getElementById('start-btn');
  if (startBtn) startBtn.onclick = startQuiz;

  document.querySelectorAll('.option').forEach(opt => {
    opt.onclick = () => {
      const q = state.questions[state.current];
      state.answers[q.id] = parseInt(opt.dataset.opt);
      render();
    };
  });

  const prevBtn = document.getElementById('prev-btn');
  if (prevBtn) prevBtn.onclick = () => { state.current--; render(); };

  const nextBtn = document.getElementById('next-btn');
  if (nextBtn) nextBtn.onclick = () => { state.current++; render(); };

  const submitBtn = document.getElementById('submit-btn');
  if (submitBtn) submitBtn.onclick = submitQuiz;

  const restartBtn = document.getElementById('restart-btn');
  if (restartBtn) restartBtn.onclick = () => {
    clearInterval(state.timerInterval);
    state = { screen: 'start', sessionId: null, questions: [], current: 0,
               answers: {}, results: null, count: 10, timerInterval: null, elapsed: 0 };
    render();
  };
}

async function startQuiz() {
  try {
    document.getElementById('app').innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading questions…</p></div>';
    const res = await fetch(`${API}/start`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ count: state.count })
    });
    const data = await res.json();
    state.sessionId = data.sessionId;
    state.questions = data.questions;
    state.screen = 'quiz';
    state.elapsed = 0;
    state.timerInterval = setInterval(() => {
      state.elapsed++;
      const el = document.querySelector('.timer');
      if (el) {
        const m = String(Math.floor(state.elapsed / 60)).padStart(2,'0');
        const s = String(state.elapsed % 60).padStart(2,'0');
        el.textContent = `⏱ ${m}:${s}`;
        el.className = state.elapsed > 600 ? 'timer urgent' : 'timer';
      }
    }, 1000);
    render();
  } catch (e) {
    showToast('Failed to start quiz. Is the server running?');
    render();
  }
}

async function submitQuiz() {
  const unanswered = state.questions.length - Object.keys(state.answers).length;
  if (unanswered > 0) {
    showToast(`${unanswered} question${unanswered > 1 ? 's' : ''} unanswered — submit anyway?`);
    await new Promise(r => setTimeout(r, 1500));
  }
  try {
    clearInterval(state.timerInterval);
    document.getElementById('app').innerHTML = '<div class="loading"><div class="spinner"></div><p>Submitting…</p></div>';
    const res = await fetch(`${API}/submit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId: state.sessionId, answers: state.answers })
    });
    const data = await res.json();
    state.results = data;
    state.screen = 'results';
    render();
  } catch (e) {
    showToast('Submission failed. Please try again.');
  }
}

function showToast(msg, duration = 3000) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), duration);
}

render();
</script>
</body>
</html>
